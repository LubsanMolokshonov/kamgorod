name: pedagogy-platform

services:
  # PHP Apache Web Server
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pedagogy_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=pedagogy_platform
      - DB_USER=pedagogy_user
      - DB_PASS=pedagogy_pass
    networks:
      - pedagogy_network
      - mail_network
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: pedagogy_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: pedagogy_platform
      MYSQL_USER: pedagogy_user
      MYSQL_PASSWORD: pedagogy_pass
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - pedagogy_network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  # AI Consultant microservice (изолированный PHP-контейнер)
  # Падение этого сервиса не влияет на основной сайт — web отвечает 502/503 на /ai-chat/api/*
  ai-consultant:
    build:
      context: .
      dockerfile: ai-consultant/Dockerfile
    container_name: pedagogy_ai
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=pedagogy_platform
      - DB_USER=pedagogy_user
      - DB_PASS=pedagogy_pass
      - YANDEX_GPT_API_KEY=${YANDEX_GPT_API_KEY}
      - YANDEX_GPT_FOLDER_ID=${YANDEX_GPT_FOLDER_ID}
      - YANDEX_GPT_MODEL=yandexgpt-lite
      - SITE_URL=${SITE_URL:-http://localhost:8080}
      - ADMIN_ALERT_EMAIL=${ADMIN_ALERT_EMAIL:-info@fgos.pro}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALERT_CHAT_ID=${TELEGRAM_ALERT_CHAT_ID:-}
    volumes:
      - ./ai-consultant:/var/www/html
      - ./classes:/var/www/shared/classes:ro
      - ./config:/var/www/shared/config:ro
      - ./includes:/var/www/shared/includes:ro
      - ./logs:/var/www/html/logs
    networks:
      - pedagogy_network
    restart: unless-stopped

  # phpMyAdmin (optional, for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pedagogy_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - db
    networks:
      - pedagogy_network
    restart: unless-stopped

networks:
  pedagogy_network:
    driver: bridge
  mail_network:
    external: true
    name: docker-mailserver_mail_network

volumes:
  db_data:
    driver: local
